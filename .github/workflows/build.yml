name: build(postgres)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - '**/Dockerfile'
  push:
    branches:
      - main
    paths:
      - '**/Dockerfile'
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * *'

jobs:
  postgres:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        name: ['postgres']
        suite: ['trixie']
        version: ['14', '15', '16', '17', '18']
        latest_version: ['18']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check
        run: |
          echo "build=true" >> $GITHUB_ENV
          if [ ! -f "${{ matrix.version }}/${{ matrix.suite }}/Dockerfile" ]; then
            echo "build=false" >> $GITHUB_ENV
            exit 0
          fi
          full_version=$(grep -m1 -oP "ENV PG_VERSION \K.*" ${{ matrix.version }}/${{ matrix.suite }}/Dockerfile | cut -d'-' -f1)
          ## Handle version format:
          # 18~beta1 --> 18.0beta1
          full_version=${full_version/\~/}
          echo "version=${{ matrix.version }}" >> $GITHUB_ENV
          echo "full_version=${full_version}" >> $GITHUB_ENV

          gh release view ${full_version} -R ${{ github.repository }} | grep postgresql-${version}_${full_version}.orig.tar.bz2 >/dev/null 2>&1 || echo "build=false" >> $GITHUB_ENV
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        if: env.build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: env.build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        if: env.build == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push image
        if: env.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.version }}/${{ matrix.suite }}/
          platforms: linux/loong64
          load: true
          push: false
          tags: |
            ${{ matrix.name }}:${{ env.full_version }}-${{ matrix.suite }}
          outputs: type=local,dest=./

      - name: Create release
        if: env.build == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="${{ env.full_version }}"
          gh release create "${TAG_NAME}" \
            --generate-notes \
            --title "${TAG_NAME}" \
            dist/*